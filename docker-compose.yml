services:
  app:
    build: .
    container_name: carbonquest-api
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "4000:4000" # HOST:CONTAINER, sekarang pakai 4000
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: postgres:16-alpine
    container_name: carbonquest-db
    environment:
      POSTGRES_USER: carbonquest
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: carbonquest_db
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db_data:
